<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#16c7b7">
    <title>Session active - Wistoria</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/workout.css">
    <link rel="stylesheet" href="css/music.css">
    <link rel="stylesheet" href="css/manual.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
  </head>
  <body data-page="session">
    <div class="app-shell">
      <aside class="sidebar" data-sidebar></aside>
      <main class="main">
        <header class="topbar">
          <button class="btn icon-btn mobile-menu" data-menu aria-label="Ouvrir le menu">☰</button>
          <div>
            <h1>Session active</h1>
            <p>Minuteur avancé, annonces vocales, vibration et enregistrement automatique.</p>
          </div>
          <div class="toolbar">
            <button class="btn" data-open-music-panel>Musique</button>
            <button class="btn" data-fullscreen>Plein écran</button>
            <a class="btn" href="workout.html">Changer</a>
          </div>
        </header>

        <section class="session-stage">
          <div class="panel session-visual">
            <img id="sessionImage" class="breathe" src="assets/images/stretch-hips.svg" alt="Exercice en cours">
          </div>
          <div class="panel timer-panel">
            <div>
              <div class="chips" id="sessionChips"></div>
              <h2 id="sessionExercise">Choisis un programme</h2>
              <p id="sessionCue">Lance une routine depuis Mes entraînements ou démarre une séance rapide.</p>
            </div>
            <div class="timer-number" id="timerNumber">00:00</div>
            <div class="progress-track"><div class="progress-fill" id="sessionProgress"></div></div>
            <div class="timer-meta">
              <div><span>Série</span><strong id="sessionSet">-</strong></div>
              <div><span>Étape</span><strong id="sessionStep">-</strong></div>
              <div><span>Temps total</span><strong id="sessionTotal">0 min</strong></div>
            </div>
            <div class="session-controls">
              <button class="btn primary" id="startTimerBtn">Commencer</button>
              <button class="btn" id="pauseTimerBtn">Pause</button>
              <button class="btn" id="skipTimerBtn">Passer</button>
              <button class="btn" id="restartTimerBtn">Recommencer</button>
              <button class="btn warning" id="stopTimerBtn">Arrêter</button>
            </div>
          </div>
        </section>
      </main>
    </div>
    <nav class="bottom-nav" data-bottom-nav></nav>
    <div class="toast-stack" id="toastStack"></div>
    <script src="js/vendor/chart.umd.min.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
