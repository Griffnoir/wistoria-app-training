<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#16c7b7">
    <title>Tableau de bord - Wistoria</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/workout.css">
    <link rel="stylesheet" href="css/music.css">
    <link rel="stylesheet" href="css/manual.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
  </head>
  <body data-page="dashboard">
    <div class="app-shell">
      <aside class="sidebar" data-sidebar></aside>
      <main class="main">
        <header class="topbar">
          <button class="btn icon-btn mobile-menu" data-menu aria-label="Ouvrir le menu">☰</button>
          <div>
            <h1>Tableau de bord</h1>
            <p>Vue rapide de ton volume, XP, fréquence et objectifs.</p>
          </div>
          <div class="toolbar">
            <button class="btn" data-export>Exporter</button>
            <a class="btn primary" href="workout.html">Nouvelle routine</a>
          </div>
        </header>

        <section class="grid four" id="dashboardMetrics"></section>

        <section class="dashboard-grid">
          <div class="panel">
            <div class="section-head">
              <div>
                <h2>Minutes par semaine</h2>
                <p>Volume d'étirement enregistré.</p>
              </div>
            </div>
            <div class="canvas-wrap"><canvas id="weeklyChart"></canvas></div>
          </div>

          <aside class="panel">
            <h2>Niveau</h2>
            <div class="xp-ring" id="xpRing"><strong>1</strong></div>
            <div class="badge-list" id="badgeList"></div>
          </aside>
        </section>

        <section class="panel">
          <div class="section-head">
            <div>
              <h2>Actions rapides</h2>
              <p>Créer, générer ou lancer une séance sans friction.</p>
            </div>
          </div>
          <div class="quick-actions">
            <button class="btn quick-action" data-quick-session><span>⏱</span> Séance rapide</button>
            <button class="btn quick-action" data-generate-session><span>⚡</span> Générer selon objectif</button>
            <a class="btn quick-action" href="calendar.html"><span>📅</span> Planifier</a>
          </div>
        </section>
      </main>
    </div>
    <nav class="bottom-nav" data-bottom-nav></nav>
    <div class="toast-stack" id="toastStack"></div>
    <script src="js/vendor/chart.umd.min.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
